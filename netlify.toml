[[redirects]]
  from = "/how-to-become-a-pilot-in/*"
  to = "/how-to-become-a-pilot-in/:splat"
  status = 200

[[redirects]]
  from = "/api/aviation-news"
  to = "/.netlify/functions/aviation-news"
  status = 200

[[redirects]]
  from = "/api/news-admin"
  to = "/.netlify/functions/news-admin"
  status = 200

[[redirects]]
  from = "/api/pilot-jobs"
  to = "/.netlify/functions/pilot-jobs"
  status = 200

[[redirects]]
  from = "/api/pilot-jobs-sync-background"
  to = "/.netlify/functions/pilot-jobs-sync-background"
  status = 200

[[redirects]]
  from = "/news-sitemap.xml"
  to = "/.netlify/functions/news-sitemap"
  status = 200

[[redirects]]
  from = "/jobs-sitemap.xml"
  to = "/.netlify/functions/jobs-sitemap"
  status = 200

[functions."news-prewarm"]
  schedule = "*/30 * * * *"

[functions."pilot-jobs-sync"]
  schedule = "12 2 * * *"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
